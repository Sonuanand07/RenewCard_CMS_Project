version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: renewcred-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: renewcred_cms
    volumes:
      - mongo_data:/data/db
    networks:
      - renewcred-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: renewcred-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:admin@mongo:27017/renewcred_cms?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_change_in_production}
      PORT: 5000
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001
      NODE_ENV: development
    depends_on:
      - mongo
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules
    networks:
      - renewcred-network
    command: npm run dev

  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
    container_name: renewcred-admin
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NODE_ENV: development
    depends_on:
      - backend
    volumes:
      - ./admin-frontend:/app/admin-frontend
      - /app/admin-frontend/node_modules
      - /app/admin-frontend/.next
    networks:
      - renewcred-network
    command: npm run dev

  public-frontend:
    build:
      context: ./public-frontend
      dockerfile: Dockerfile
    container_name: renewcred-public
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NODE_ENV: development
      PORT: 3001
    depends_on:
      - backend
    volumes:
      - ./public-frontend:/app/public-frontend
      - /app/public-frontend/node_modules
      - /app/public-frontend/.next
    networks:
      - renewcred-network
    command: npm run dev

volumes:
  mongo_data:

networks:
  renewcred-network:
    driver: bridge
